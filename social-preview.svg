<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- Accent line -->
  <rect x="0" y="520" width="1280" height="20" fill="url(#accent)"/>
  <!-- Title -->
  <text x="60" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">
    Telegram Archive Bot
  </text>
  <text x="60" y="280" font-family="Arial, sans-serif" font-size="32" fill="#b0b0b0">
    Python Edition — Monolithic &amp; Powerful
  </text>
  <text x="60" y="360" font-family="Arial, sans-serif" font-size="24" fill="#e94560">
    🔗 File Sharing • 📁 Smart Archive • ⚙️ Admin Panel
  </text>
  <!-- Bot icon placeholder (circle) -->
  <circle cx="1100" cy="200" r="80" fill="#0f3460" stroke="#e94560" stroke-width="4"/>
  <text x="1100" y="215" font-family="Arial" font-size="40" fill="#ffffff" text-anchor="middle">🤖</text>
  <!-- Footer -->
  <text x="60" y="500" font-family="Arial" font-size="20" fill="#888888">
    By Ali al-Akbar Haidar | https://alialakbarhaidarshaker.vercel.app
  </text>
  <text x="60" y="540" font-family="Arial" font-size="18" fill="#666666">
    Telegram: @dextermorgenk | Bot: @arcivealibot
  </text>
</svg>
